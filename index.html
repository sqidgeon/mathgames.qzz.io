<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eaglercraft 1.12.2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 10px; /* tiny breathing room around the whole card */
        }

        .container {
            background: #1e1e32;
            padding: 10px 10px 8px;
            border-radius: 18px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.04);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .embed-wrapper {
            position: relative;
            width: 98vw;          /* nearly full width */
            height: 92vh;         /* nearly full height – leaves a bit of space */
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .embed-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .caption {
            margin-top: 6px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            letter-spacing: 0.2px;
            font-weight: 400;
            flex-shrink: 0;
        }

        .caption a {
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.12);
            transition: color 0.2s;
        }

        .caption a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* fine-tune for very small screens */
        @media (max-width: 640px) {
            .container {
                padding: 6px;
                border-radius: 12px;
            }
            .embed-wrapper {
                width: 96vw;
                height: 86vh;
                border-radius: 8px;
            }
        }

        /* avoid overflow on extremely tall screens */
        @media (min-aspect-ratio: 2/1) {
            .embed-wrapper {
                height: 80vh;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="embed-wrapper">
            <iframe
                src="https://cdn.mathgames.qzz.io/eaglercraft/1-12-2-WASM.html"
                loading="lazy"
                allow="autoplay; fullscreen"
                title="Eaglercraft 1.12.2"
            ></iframe>
        </div>
        <div class="caption">
            <a href="https://cdn.mathgames.qzz.io/eaglercraft/1-12-2-WASM.html" target="_blank" rel="noopener">Eaglercraft 1.12.2</a>
            &nbsp;·&nbsp; play in browser
        </div>
    </div>

</body>
</html>
